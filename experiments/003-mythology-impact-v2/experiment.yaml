name: "003-mythology-impact-v2-pi-rerun"
version: 1

models:
  - id: "qwen3.5:9b-lab"
    provider: ollama
    options:
      num_ctx: 8192
      temperature: 0.7
      presence_penalty: 0
      top_k: 40
  - id: "qwen3.5:35b-lab"
    provider: ollama
    options:
      num_ctx: 8192
      temperature: 0.7
      presence_penalty: 0
      top_k: 40

conditions:
  - name: minimal
    system_prompt: prompts/system-minimal.txt
  - name: conventional
    system_prompt: prompts/system-conventional.txt
  - name: mythology-only
    system_prompt: prompts/system-mythology-only.txt
  - name: mythology-withexamples
    system_prompt: prompts/system-mythology-withexamples.txt

scenario:
  workspace: scenario/
  user_prompt: prompts/user-task.txt
  tools:
    - read
    - bash
    - edit
    - write
    - grep
    - find
    - ls

execution:
  replicas: 3
  sandbox: bwrap
  trace_capture: true
  br_stub: true
  timeout_seconds: 900

scoring:
  auto_scorers:
    - type: workspace_diff
    - type: test_pass
      config:
        test_command: "go test ./..."
    - type: br_stub
  weights:
    workspace_diff: 0.4
    test_pass: 0.4
    br_stub: 0.2
